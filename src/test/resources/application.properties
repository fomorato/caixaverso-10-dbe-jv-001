# Test profile - banco em memÛria
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=sa
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false

# Security via properties file (mesmo modelo usado no projeto)
quarkus.security.users.file.enabled=true
quarkus.security.users.file.users=users.properties
quarkus.security.users.file.roles=roles.properties

# URL do REST Client (n„o ser·s usado quando mockado)
quarkus.rest-client.taxas-api.url=http://localhost:9000

# Alterar porta padr„o 8081
quarkus.http.test-port=0
quarkus.http.test-ssl-port=0

# Habilita Basic Auth
quarkus.http.auth.basic=true

# usu·rios/roles em properties
quarkus.security.users.embedded.enabled=true
quarkus.security.users.embedded.plain-text=true
quarkus.security.users.embedded.users.cliente=senha123
quarkus.security.users.embedded.roles.cliente=Cliente
quarkus.security.users.embedded.users.gerente=senha123
quarkus.security.users.embedded.roles.gerente=Gerente
